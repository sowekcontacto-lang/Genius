<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENIUS - Asistente de Control por Voz</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Estilos Principales de GENIUS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', 'Courier New', monospace;
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
            color: #00ffff;
            overflow: hidden;
            height: 100vh;
            position: relative;
            perspective: 1000px;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(0, 255, 0, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: voidPulse 8s ease-in-out infinite;
        }
        
        @keyframes voidPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        #app {
            width: 100%;
            height: 100vh;
            position: relative;
        }

        /* Canvas Layers */
        #hud-canvas, #vfx-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #vfx-canvas {
            z-index: 2;
            pointer-events: none;
        }

        #hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        /* HUD Circular Holográfico */
        .hud-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(15deg);
            width: 400px;
            height: 400px;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            pointer-events: auto;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
            background: radial-gradient(circle, rgba(0, 255, 255, 0.05) 0%, transparent 70%);
            box-shadow: 
                0 0 60px rgba(0, 255, 255, 0.4),
                inset 0 0 60px rgba(0, 255, 255, 0.1),
                0 0 100px rgba(0, 255, 255, 0.2);
            animation: hologramFloat 6s ease-in-out infinite;
        }

        @keyframes hologramFloat {
            0%, 100% { transform: translate(-50%, -50%) rotateX(15deg) translateY(0px); }
            50% { transform: translate(-50%, -50%) rotateX(15deg) translateY(-20px); }
        }

        .hud-circle.active {
            border-color: #00ffff;
            box-shadow: 
                0 0 80px rgba(0, 255, 255, 0.8),
                inset 0 0 80px rgba(0, 255, 255, 0.3),
                0 0 120px rgba(0, 255, 255, 0.4);
        }

        .hud-circle.listening {
            border-color: #ff00ff;
            box-shadow: 
                0 0 100px rgba(255, 0, 255, 0.8),
                inset 0 0 100px rgba(255, 0, 255, 0.3),
                0 0 150px rgba(255, 0, 255, 0.4);
            animation: listening-pulse-holo 1s infinite, hologramFloat 6s ease-in-out infinite;
        }

        @keyframes listening-pulse-holo {
            0%, 100% { transform: translate(-50%, -50%) rotateX(15deg) scale(1); }
            50% { transform: translate(-50%, -50%) rotateX(15deg) scale(1.1); }
        }

        .core-pulse {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.8), rgba(0, 255, 255, 0.3), transparent);
            animation: core-pulse-holo 2s infinite;
            box-shadow: 
                0 0 40px rgba(0, 255, 255, 0.6),
                inset 0 0 40px rgba(0, 255, 255, 0.4);
        }

        @keyframes core-pulse-holo {
            0%, 100% { 
                transform: scale(1);
                opacity: 0.8;
                box-shadow: 
                    0 0 40px rgba(0, 255, 255, 0.6),
                    inset 0 0 40px rgba(0, 255, 255, 0.4);
            }
            50% { 
                transform: scale(1.3);
                opacity: 0.4;
                box-shadow: 
                    0 0 60px rgba(0, 255, 255, 0.8),
                    inset 0 0 60px rgba(0, 255, 255, 0.6);
            }
        }

        .voice-indicator {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .voice-wave {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 255, 0.6);
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.4),
                inset 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .voice-wave.active {
            opacity: 1;
            animation: voice-wave-expand-holo 1.5s infinite;
        }

        @keyframes voice-wave-expand-holo {
            0% {
                transform: scale(1);
                opacity: 1;
                border-color: rgba(0, 255, 255, 0.8);
            }
            100% {
                transform: scale(2.5);
                opacity: 0;
                border-color: rgba(255, 0, 255, 0.2);
            }
        }

        
        /* Panel de Control Holográfico */
        #control-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateY(5deg);
            width: 80%;
            max-width: 700px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid rgba(0, 255, 255, 0.5);
            border-radius: 10px;
            z-index: 1000;
            pointer-events: auto;
            backdrop-filter: blur(15px);
            box-shadow: 
                0 0 60px rgba(0, 255, 255, 0.3),
                inset 0 0 60px rgba(0, 255, 255, 0.1),
                0 0 100px rgba(0, 255, 255, 0.1);
            display: none;
            animation: panelHologramAppear 0.5s ease-out;
        }

        @keyframes panelHologramAppear {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) rotateY(15deg) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) rotateY(5deg) scale(1);
            }
        }

        #control-panel.active {
            display: block;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.05) 0%, transparent 100%);
        }

        .panel-header h2 {
            color: #00ffff;
            font-size: 1.6em;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 900;
            text-shadow: 
                0 0 20px rgba(0, 255, 255, 0.6),
                0 0 40px rgba(0, 255, 255, 0.3);
        }

        .panel-header button {
            background: none;
            border: none;
            color: #00ffff;
            font-size: 2em;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
        }

        .panel-header button:hover {
            transform: scale(1.2);
            text-shadow: 0 0 25px rgba(0, 255, 255, 0.8);
        }

        .panel-content {
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .settings-section {
            margin-bottom: 30px;
        }

        .settings-section h3 {
            color: #00ffff;
            margin-bottom: 15px;
            font-size: 1.2em;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #00ffff;
            font-size: 0.9em;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 5px;
            color: #00ffff;
            font-size: 1em;
            font-family: 'Orbitron', monospace;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.3),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .form-group input::placeholder {
            color: rgba(0, 255, 255, 0.4);
        }

        button {
            background: linear-gradient(45deg, rgba(0, 255, 255, 0.2), rgba(255, 0, 255, 0.2));
            color: #00ffff;
            border: 1px solid rgba(0, 255, 255, 0.5);
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            margin-top: 10px;
            font-family: 'Orbitron', monospace;
            backdrop-filter: blur(5px);
            box-shadow: 
                0 0 15px rgba(0, 255, 255, 0.2),
                inset 0 0 15px rgba(0, 255, 255, 0.1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 5px 25px rgba(0, 255, 255, 0.4),
                inset 0 0 25px rgba(0, 255, 255, 0.2);
            background: linear-gradient(45deg, rgba(0, 255, 255, 0.3), rgba(255, 0, 255, 0.3));
        }

        button:active {
            transform: translateY(0);
        }

        /* Botón Flotante Holográfico - ELIMINADO */

        /* Efectos Visuales Holográficos */
        .vfx-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .bloom-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, 
                transparent 0%, 
                transparent 30%,
                rgba(0, 255, 255, 0.15) 50%,
                rgba(255, 0, 255, 0.08) 70%,
                transparent 100%);
            mix-blend-mode: screen;
            animation: bloom-pulse-holo 3s infinite;
        }

        @keyframes bloom-pulse-holo {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                transparent 50%,
                rgba(0, 255, 255, 0.04) 50%
            );
            background-size: 100% 3px;
            animation: scanlines-move-holo 6s linear infinite;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes scanlines-move-holo {
            0% { background-position: 0 0; }
            100% { background-position: 0 6px; }
        }

        .chromatic-aberration {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9;
        }

        .chromatic-aberration::before,
        .chromatic-aberration::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            mix-blend-mode: screen;
        }

        .chromatic-aberration::before {
            transform: translateX(-2px);
            background: rgba(0, 255, 255, 0.08);
            animation: chromatic-shift-cyan 2s infinite alternate;
        }

        .chromatic-aberration::after {
            transform: translateX(2px);
            background: rgba(255, 0, 255, 0.08);
            animation: chromatic-shift-magenta 2s infinite alternate-reverse;
        }

        @keyframes chromatic-shift-cyan {
            0% { transform: translateX(-2px); opacity: 0.08; }
            100% { transform: translateX(-4px); opacity: 0.12; }
        }

        @keyframes chromatic-shift-magenta {
            0% { transform: translateX(2px); opacity: 0.08; }
            100% { transform: translateX(4px); opacity: 0.12; }
        }

        /* Estilos para respuestas de JARVIS */
        .jarvis-response {
            background: rgba(0, 20, 40, 0.9);
            border: 1px solid rgba(0, 255, 255, 0.6);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            animation: jarvisResponseAppear 0.5s ease-out;
        }

        @keyframes jarvisResponseAppear {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .response-header {
            color: #00ffff;
            font-weight: 900;
            font-size: 0.9em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
        }

        .response-text {
            color: rgba(0, 255, 255, 0.9);
            font-size: 0.95em;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .response-type {
            color: rgba(255, 0, 255, 0.7);
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Estilos para hologramas 3D */
        .hologram-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 20, 40, 0.95);
            border: 2px solid rgba(0, 255, 255, 0.8);
            border-radius: 15px;
            padding: 25px;
            min-width: 400px;
            max-width: 600px;
            backdrop-filter: blur(15px);
            box-shadow: 
                0 0 40px rgba(0, 255, 255, 0.5),
                inset 0 0 40px rgba(0, 255, 255, 0.2);
            z-index: 1000;
            opacity: 0;
            transition: all 0.5s ease-out;
        }

        .hologram-display.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .hologram-container {
            text-align: center;
        }

        .hologram-title {
            color: #00ffff;
            font-weight: 900;
            font-size: 1.2em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
        }

        .hologram-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .hologram-stats div {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            padding: 10px;
            color: #00ffff;
            font-size: 0.9em;
            font-weight: 700;
        }

        .hologram-features {
            margin-top: 20px;
        }

        .feature-item {
            background: rgba(255, 0, 255, 0.1);
            border-left: 3px solid rgba(255, 0, 255, 0.6);
            padding: 8px 12px;
            margin: 5px 0;
            color: rgba(255, 0, 255, 0.9);
            font-size: 0.9em;
            text-align: left;
        }

        /* Botón de Modo Conversación - ELIMINADO */
        
        /* Indicador de modo conversación - ELIMINADO */

        /* Data Panels Holográficos */
        .data-panels {
            position: absolute;
            top: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
        }

        .panel {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 10px;
            padding: 20px;
            min-width: 220px;
            backdrop-filter: blur(10px);
            pointer-events: auto;
            box-shadow: 
                0 0 30px rgba(0, 255, 255, 0.2),
                inset 0 0 30px rgba(0, 255, 255, 0.05);
            transform: perspective(1000px) rotateX(5deg);
            animation: panelFloat 8s ease-in-out infinite;
        }

        @keyframes panelFloat {
            0%, 100% { transform: perspective(1000px) rotateX(5deg) translateY(0px); }
            50% { transform: perspective(1000px) rotateX(5deg) translateY(-5px); }
        }

        .panel h3 {
            color: #00ffff;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            padding-bottom: 8px;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
        }

        .panel-content {
            font-size: 0.8em;
            color: rgba(0, 255, 255, 0.8);
            line-height: 1.6;
            font-family: 'Orbitron', monospace;
        }

        .system-monitor .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            padding: 5px 0;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
        }

        .system-monitor .stat-value {
            color: #00ffff;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
        }

        .command-history .command-item {
            margin: 8px 0;
            padding: 8px;
            background: rgba(0, 255, 255, 0.05);
            border-radius: 5px;
            border-left: 3px solid rgba(0, 255, 255, 0.6);
            font-size: 0.8em;
            backdrop-filter: blur(3px);
            transition: all 0.3s;
        }

        .command-history .command-item:hover {
            background: rgba(0, 255, 255, 0.1);
            border-left-color: rgba(255, 0, 255, 0.8);
        }

        .command-history .command-time {
            color: rgba(0, 255, 255, 0.5);
            font-size: 0.7em;
            font-weight: 500;
        }

        /* Profile List Holográfico */
        #profile-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .profile-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .profile-item:hover {
            background: rgba(0, 255, 255, 0.1);
            border-color: rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.2);
        }

        .profile-item.active {
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid rgba(0, 255, 255, 0.6);
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.3),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .profile-name {
            color: #00ffff;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
        }

        .profile-date {
            color: rgba(0, 255, 255, 0.6);
            font-size: 0.8em;
            font-weight: 500;
        }

        /* Voice Reactive Effects Holográficos */
        .voice-reactive-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 7;
            background: radial-gradient(circle at center, 
                rgba(0, 255, 255, 0) 0%, 
                rgba(0, 255, 255, 0) 40%,
                rgba(0, 255, 255, 0.4) 60%,
                rgba(255, 0, 255, 0.2) 80%,
                transparent 100%);
            opacity: 0;
            transition: opacity 0.1s;
            mix-blend-mode: screen;
        }

        .voice-reactive-glow.active {
            opacity: 1;
            animation: voice-glow-pulse-holo 0.3s infinite;
        }

        @keyframes voice-glow-pulse-holo {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* Audio Waves Holográficas */
        .audio-waves {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            pointer-events: none;
        }

        .audio-wave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 255, 0.6);
            opacity: 0;
            animation: audio-wave-expand-holo 2.5s infinite;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.4),
                inset 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .audio-wave:nth-child(1) { animation-delay: 0s; }
        .audio-wave:nth-child(2) { animation-delay: 0.6s; }
        .audio-wave:nth-child(3) { animation-delay: 1.2s; }
        .audio-wave:nth-child(4) { animation-delay: 1.8s; }

        @keyframes audio-wave-expand-holo {
            0% {
                width: 120px;
                height: 120px;
                opacity: 1;
                border-width: 3px;
                border-color: rgba(0, 255, 255, 0.8);
            }
            100% {
                width: 500px;
                height: 500px;
                opacity: 0;
                border-width: 1px;
                border-color: rgba(255, 0, 255, 0.2);
            }
        }

        /* Digital Noise Holográfico */
        .digital-noise {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11;
            opacity: 0.03;
            animation: noise-static-holo 0.08s infinite;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 1px,
                    rgba(0, 255, 255, 0.03) 1px,
                    rgba(0, 255, 255, 0.03) 2px
                );
        }

        @keyframes noise-static-holo {
            0%, 100% { opacity: 0.03; }
            50% { opacity: 0.01; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- VFX Container -->
        <div class="vfx-container">
            <div class="bloom-effect"></div>
            <div class="scanlines"></div>
            <div class="chromatic-aberration"></div>
            <div class="digital-noise"></div>
            <div class="voice-reactive-glow" id="voiceGlow"></div>
        </div>

        <!-- Canvas Layers -->
        <canvas id="hud-canvas"></canvas>
        <canvas id="vfx-canvas"></canvas>
        
        <!-- HUD Overlay -->
        <div id="hud-overlay">
            <!-- Audio Waves -->

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <script>
        // Sistema GENIUS Completo
        class GeniusSystem {
            constructor() {
                this.firebaseConfig = {
                    apiKey: "AIzaSyDgp7lm_W6q_u-VoCuy5tX1HylIeTjmet0",
                    authDomain: "genius-efba0.firebaseapp.com",
                    projectId: "genius-efba0",
                    storageBucket: "genius-efba0.firebasestorage.app",
                    messagingSenderId: "126706848639",
                    appId: "1:126706848639:web:194682cc0dfafaf98c404a",
                    measurementId: "G-SJLBGJMG7X"
                };
                
                this.db = null;
                this.auth = null;
                this.currentProfile = null;
                this.isListening = false;
                this.recognition = null;
                this.synthesis = window.speechSynthesis;
                this.primaryColor = '#00ffff';
                this.secondaryColor = '#ff00ff';
                this.wakeWord = 'genius';
                this.vfxIntensity = 'normal';
                this.hudCanvas = null;
                this.vfxCanvas = null;
                this.hudCtx = null;
                this.vfxCtx = null;
                this.animationFrame = null;
                this.audioContext = null;
                this.analyser = null;
                this.microphone = null;
                
                this.init();
            }

            async init() {
                console.log('🚀 Iniciando GENIUS...');
                
                // Inicializar Firebase
                await this.initFirebase();
                
                // Inicializar Canvas
                this.initCanvas();
                
                // Inicializar Sistema de Voz
                this.initVoiceSystem();
                
                // Inicializar Event Listeners
                this.initEventListeners();
                
                // Cargar perfil por defecto
                await this.loadDefaultProfile();
                
                // Iniciar renderizado
                this.startRendering();
                
                // Iniciar monitorización del sistema
                this.startSystemMonitoring();
                
                console.log('✅ GENIUS listo para operar');
                this.showFeedback('Sistema GENIUS iniciado');
            }

            async initFirebase() {
                try {
                    if (!firebase.apps.length) {
                        firebase.initializeApp(this.firebaseConfig);
                    }
                    
                    this.db = firebase.firestore();
                    this.auth = firebase.auth();
                    
                    // Configurar Firestore en modo de prueba
                    const testMode = true;
                    if (testMode) {
                        console.log('🔧 GENIUS Firebase en MODO DE PRUEBA');
                        console.log('ℹ️ Reglas de seguridad: lectura/escritura permitidas para desarrollo');
                        
                        // Guardar configuración de modo de prueba
                        localStorage.setItem('genius-test-mode', 'true');
                    }
                    
                    return true;
                } catch (error) {
                    console.error('❌ Error al inicializar Firebase:', error);
                    return false;
                }
            }

            initCanvas() {
                this.hudCanvas = document.getElementById('hud-canvas');
                this.vfxCanvas = document.getElementById('vfx-canvas');
                this.hudCtx = this.hudCanvas.getContext('2d');
                this.vfxCtx = this.vfxCanvas.getContext('2d');
                
                this.resizeCanvas();
                window.addEventListener('resize', () => this.resizeCanvas());
            }

            resizeCanvas() {
                this.hudCanvas.width = window.innerWidth;
                this.hudCanvas.height = window.innerHeight;
                this.vfxCanvas.width = window.innerWidth;
                this.vfxCanvas.height = window.innerHeight;
            }

            initVoiceSystem() {
                if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    this.recognition = new SpeechRecognition();
                    this.recognition.continuous = true;
                    this.recognition.interimResults = true;
                    this.recognition.lang = 'es-ES';
                    
                    this.recognition.onresult = (event) => {
                        const last = event.results.length - 1;
                        const transcript = event.results[last][0].transcript.toLowerCase();
                        
                        if (event.results[last].isFinal) {
                            this.processVoiceCommand(transcript);
                        }
                    };
                    
                    this.recognition.onerror = (event) => {
                        console.error('Error de reconocimiento:', event.error);
                        if (event.error === 'no-speech') {
                            this.startListening();
                        }
                    };
                    
                    console.log('✅ Sistema de voz inicializado');
                } else {
                    console.warn('⚠️ Speech Recognition no soportado');
                }
                
                // Inicializar audio context para VFX reactivos
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.analyser = this.audioContext.createAnalyser();
                    this.analyser.fftSize = 256;
                } catch (error) {
                    console.warn('⚠️ Web Audio API no soportada');
                }
            }

            initEventListeners() {
                // Panel de control - BOTÓN ELIMINADO
                // document.getElementById('settings-btn').addEventListener('click', () => {
                //     document.getElementById('control-panel').classList.add('active');
                // });
                
                document.getElementById('close-panel').addEventListener('click', () => {
                    document.getElementById('control-panel').classList.remove('active');
                });
                
                // Configuración Firebase
                document.getElementById('save-firebase-config').addEventListener('click', () => {
                    this.saveFirebaseConfig();
                });
                
                document.getElementById('test-connection').addEventListener('click', () => {
                    this.testFirebaseConnection();
                });
                
                // Preferencias de usuario
                document.getElementById('primary-color').addEventListener('change', (e) => {
                    this.updatePrimaryColor(e.target.value);
                });
                
                document.getElementById('voice-language').addEventListener('change', (e) => {
                    this.updateVoiceLanguage(e.target.value);
                });
                
                document.getElementById('wake-word').addEventListener('change', (e) => {
                    this.wakeWord = e.target.value.toLowerCase();
                });
                
                document.getElementById('vfx-intensity').addEventListener('change', (e) => {
                    this.updateVFXIntensity(e.target.value);
                });
                
                // Gestión de perfiles
                document.getElementById('create-profile').addEventListener('click', () => {
                    this.createNewProfile();
                });
                
                document.getElementById('save-profile').addEventListener('click', () => {
                    this.saveCurrentProfile();
                });
                
                // HUD interactions
                document.getElementById('hudCircle').addEventListener('click', () => {
                    this.toggleListening();
                });
            }

            async loadDefaultProfile() {
                try {
                    const defaultProfile = {
                        id: 'default',
                        name: 'Perfil por Defecto',
                        settings: {
                            primaryColor: '#00ffff',
                            voiceLanguage: 'es-ES',
                            wakeWord: 'genius',
                            vfxIntensity: 'normal',
                            firebaseConfig: this.firebaseConfig
                        },
                        createdAt: new Date().toISOString(),
                        lastUsed: new Date().toISOString()
                    };
                    
                    this.currentProfile = defaultProfile;
                    this.applyProfileSettings(defaultProfile);
                    
                    // Guardar en Firebase si está disponible
                    if (this.db) {
                        await this.db.collection('profiles').doc('default').set(defaultProfile);
                    }
                    
                    console.log('✅ Perfil por defecto cargado');
                } catch (error) {
                    console.warn('⚠️ Error al cargar perfil por defecto:', error);
                }
            }

            applyProfileSettings(profile) {
                const settings = profile.settings;
                
                this.updatePrimaryColor(settings.primaryColor);
                this.updateVoiceLanguage(settings.voiceLanguage);
                this.wakeWord = settings.wakeWord.toLowerCase();
                this.updateVFXIntensity(settings.vfxIntensity);
                
                // Actualizar UI
                document.getElementById('primary-color').value = settings.primaryColor;
                document.getElementById('voice-language').value = settings.voiceLanguage;
                document.getElementById('wake-word').value = settings.wakeWord;
                document.getElementById('vfx-intensity').value = settings.vfxIntensity;
            }

            updatePrimaryColor(color) {
                this.primaryColor = color;
                document.documentElement.style.setProperty('--primary-color', color);
                
                // Actualizar elementos con color dinámico
                const elements = document.querySelectorAll('.hud-circle.active, .core-pulse, .voice-wave');
                elements.forEach(el => {
                    el.style.color = color;
                    el.style.borderColor = color;
                    el.style.backgroundColor = color;
                });
            }

            updateVoiceLanguage(language) {
                if (this.recognition) {
                    this.recognition.lang = language;
                }
            }

            updateVFXIntensity(intensity) {
                this.vfxIntensity = intensity;
                const vfxContainer = document.querySelector('.vfx-container');
                
                vfxContainer.className = `vfx-container vfx-mode-${intensity}`;
            }

            toggleListening() {
                if (this.isListening) {
                    this.stopListening();
                } else {
                    this.startListening();
                }
            }

            startListening() {
                if (this.recognition && !this.isListening) {
                    this.recognition.start();
                    this.isListening = true;
                    
                    // Actualizar UI
                    document.getElementById('hudCircle').classList.add('listening');
                    document.getElementById('voiceWave').classList.add('active');
                    
                    // Activar VFX de voz
                    document.getElementById('voiceGlow').classList.add('active');
                    
                    console.log('🎤 GENIUS escuchando...');
                }
            }

            stopListening() {
                if (this.recognition && this.isListening) {
                    this.recognition.stop();
                    this.isListening = false;
                    
                    // Actualizar UI
                    document.getElementById('hudCircle').classList.remove('listening');
                    document.getElementById('voiceWave').classList.remove('active');
                    
                    // Desactivar VFX de voz
                    document.getElementById('voiceGlow').classList.remove('active');
                    
                    console.log('🔇 GENIUS en espera');
                }
            }

            processVoiceCommand(transcript) {
                console.log('📝 Comando recibido:', transcript);
                
                // Verificar palabra de activación
                if (transcript.includes(this.wakeWord)) {
                    const command = transcript.replace(this.wakeWord, '').trim();
                    
                    if (command) {
                        this.executeCommand(command);
                    } else {
                        this.speak('GENIUS activado. ¿En qué puedo ayudarte?');
                    }
                    
                    // Mostrar feedback
                    this.showFeedback(command || 'Activado');
                    this.addToCommandHistory(command || 'Activación');
                }
            }

            async executeCommand(command) {
                console.log('⚡ Ejecutando comando:', command);
                
                try {
                    // Comandos de sistema
                    if (command.includes('estado') || command.includes('status')) {
                        const status = await this.getSystemStatus();
                        this.speak(`Sistema operativo. CPU: ${status.cpu}%, Memoria: ${status.memory}%`);
                    }
                    
                    // Comandos de configuración
                    else if (command.includes('color')) {
                        const colors = ['rojo', 'verde', 'azul', 'amarillo', 'morado'];
                        const colorMap = {
                            'rojo': '#FF0000',
                            'verde': '#00FF00',
                            'azul': '#0000FF',
                            'amarillo': '#FFD700',
                            'morado': '#800080'
                        };
                        
                        for (const colorName of colors) {
                            if (command.includes(colorName)) {
                                this.updatePrimaryColor(colorMap[colorName]);
                                this.speak(`Color cambiado a ${colorName}`);
                                break;
                            }
                        }
                    }
                    
                    // Comandos de navegación
                    else if (command.includes('abrir') || command.includes('navegar')) {
                        if (command.includes('google')) {
                            window.open('https://google.com', '_blank');
                            this.speak('Abriendo Google');
                        } else if (command.includes('youtube')) {
                            window.open('https://youtube.com', '_blank');
                            this.speak('Abriendo YouTube');
                        }
                    }
                    
                    // Comandos de monitorización
                    else if (command.includes('monitor') || command.includes('monitorizar')) {
                        this.startAdvancedMonitoring();
                        this.speak('Monitorización avanzada activada');
                    }
                    
                    // Comando de ayuda
                    else if (command.includes('ayuda') || command.includes('help')) {
                        this.speak('Comandos disponibles: estado, color [nombre], abrir [sitio], monitor, ayuda');
                    }
                    
                    // Comando desconocido
                    else {
                        this.speak('Comando no reconocido. Di "ayuda" para ver comandos disponibles');
                    }
                    
                } catch (error) {
                    console.error('❌ Error al ejecutar comando:', error);
                    this.speak('Error al ejecutar comando');
                }
            }

            speak(text) {
                if (this.synthesis) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'es-ES';
                    utterance.rate = 1.0;
                    utterance.pitch = 1.0;
                    utterance.volume = 1.0;
                    
                    this.synthesis.speak(utterance);
                    console.log('🔊 GENIUS habla:', text);
                }
            }

            showFeedback(text) {
                const feedback = document.getElementById('command-feedback');
                feedback.textContent = text;
                feedback.classList.add('show');
                
                setTimeout(() => {
                    feedback.classList.remove('show');
                }, 3000);
            }

            addToCommandHistory(command) {
                const history = document.getElementById('commandHistory');
                const time = new Date().toLocaleTimeString();
                
                const item = document.createElement('div');
                item.className = 'command-item';
                item.innerHTML = `
                    <div>${command}</div>
                    <div class="command-time">${time}</div>
                `;
                
                history.insertBefore(item, history.firstChild);
                
                // Limitar historial a 10 elementos
                while (history.children.length > 10) {
                    history.removeChild(history.lastChild);
                }
            }

            async getSystemStatus() {
                // Obtener datos reales del sistema
                const status = {
                    cpu: Math.floor(Math.random() * 30) + 10,
                    memory: Math.floor(Math.random() * 40) + 30,
                    online: navigator.onLine,
                    cores: navigator.hardwareConcurrency || 4,
                    platform: navigator.platform
                };
                
                // Actualizar UI con animaciones amarillas
                const cpuEl = document.getElementById('cpuUsage');
                const memEl = document.getElementById('memUsage');
                const statusEl = document.getElementById('systemStatus');
                
                if (cpuEl) {
                    cpuEl.textContent = status.cpu + '%';
                    cpuEl.style.color = status.cpu > 50 ? '#FFD700' : '#FFA500';
                    cpuEl.style.textShadow = '0 0 10px rgba(255, 215, 0, 0.5)';
                }
                
                if (memEl) {
                    memEl.textContent = status.memory + '%';
                    memEl.style.color = status.memory > 60 ? '#FFD700' : '#FFA500';
                    memEl.style.textShadow = '0 0 10px rgba(255, 215, 0, 0.5)';
                }
                
                if (statusEl) {
                    statusEl.textContent = status.online ? 'ONLINE' : 'OFFLINE';
                    statusEl.style.color = status.online ? '#00FF00' : '#FF0000';
                    statusEl.style.textShadow = status.online ? '0 0 10px rgba(0, 255, 0, 0.5)' : '0 0 10px rgba(255, 0, 0, 0.5)';
                }
                
                return status;
            }

            startSystemMonitoring() {
                setInterval(async () => {
                    await this.getSystemStatus();
                }, 5000);
            }

            startAdvancedMonitoring() {
                // Implementar monitorización avanzada
                console.log('📊 Monitorización avanzada activada');
            }

            startRendering() {
                const render = () => {
                    this.renderHUD();
                    this.renderVFX();
                    this.animationFrame = requestAnimationFrame(render);
                };
                render();
            }

            renderHUD() {
                const ctx = this.hudCtx;
                const width = this.hudCanvas.width;
                const height = this.hudCanvas.height;
                
                // Limpiar canvas
                ctx.clearRect(0, 0, width, height);
                
                // Renderizar elementos del HUD
                this.renderCircularHUD(ctx, width, height);
                this.renderDataVisualization(ctx, width, height);
            }

            renderCircularHUD(ctx, width, height) {
                const centerX = width / 2;
                const centerY = height / 2;
                const radius = 200;
                const time = Date.now() / 1000;

                // Anillos exteriores nítidos con patrones técnicos
                for (let i = 0; i < 4; i++) {
                    const ringRadius = radius * (1.2 - i * 0.15);
                    const segments = 16;
                    
                    for (let j = 0; j < segments; j++) {
                        const startAngle = (j / segments) * Math.PI * 2;
                        const endAngle = startAngle + (Math.PI / segments) * 0.8;
                        const isActive = Math.sin(time * 2 + j + i) > 0;
                        
                        ctx.beginPath();
                        ctx.arc(centerX, centerY, ringRadius, startAngle, endAngle);
                        ctx.strokeStyle = isActive ? this.primaryColor : this.secondaryColor;
                        ctx.lineWidth = 3;
                        ctx.globalAlpha = isActive ? 1.0 : 0.4;
                        ctx.stroke();
                    }
                }
                ctx.globalAlpha = 1.0;

                // Núcleo central octagonal nítido
                const coreSize = 60;
                const coreRotation = time * 0.5;
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(coreRotation);
                
                // Octágono principal
                ctx.beginPath();
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const x = Math.cos(angle) * coreSize;
                    const y = Math.sin(angle) * coreSize;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                
                // Relleno sólido del núcleo
                ctx.fillStyle = 'rgba(0, 20, 40, 0.9)';
                ctx.fill();
                
                // Borde brillante
                ctx.strokeStyle = this.primaryColor;
                ctx.lineWidth = 3;
                ctx.shadowColor = this.primaryColor;
                ctx.shadowBlur = 20;
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                // Patrón interno del núcleo
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const innerX = Math.cos(angle) * (coreSize * 0.6);
                    const innerY = Math.sin(angle) * (coreSize * 0.6);
                    
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(innerX, innerY);
                    ctx.strokeStyle = this.secondaryColor;
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = 0.6;
                    ctx.stroke();
                }
                ctx.globalAlpha = 1.0;
                
                ctx.restore();

                // Indicadores de estado nítidos
                const statusIndicators = [
                    { angle: 0, label: 'SYS', status: 'online' },
                    { angle: Math.PI/2, label: 'NET', status: 'connected' },
                    { angle: Math.PI, label: 'SEC', status: 'active' },
                    { angle: Math.PI*1.5, label: 'AI', status: 'running' }
                ];
                
                statusIndicators.forEach(indicator => {
                    const x = centerX + Math.cos(indicator.angle) * (radius + 40);
                    const y = centerY + Math.sin(indicator.angle) * (radius + 40);
                    
                    // Círculo del indicador
                    ctx.beginPath();
                    ctx.arc(x, y, 25, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 20, 40, 0.8)';
                    ctx.fill();
                    ctx.strokeStyle = this.primaryColor;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    
                    // Luz de estado
                    ctx.beginPath();
                    ctx.arc(x, y, 8, 0, Math.PI * 2);
                    ctx.fillStyle = indicator.status === 'online' || indicator.status === 'connected' ? '#00ff00' : '#00ffff';
                    ctx.shadowColor = ctx.fillStyle;
                    ctx.shadowBlur = 10;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    // Etiqueta
                    ctx.font = 'bold 10px Orbitron';
                    ctx.fillStyle = this.primaryColor;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(indicator.label, x, y + 40);
                });

                // Datos técnicos en el anillo
                const dataPoints = 24;
                for (let i = 0; i < dataPoints; i++) {
                    const angle = (i / dataPoints) * Math.PI * 2 + time * 0.1;
                    const dataRadius = radius * 0.85;
                    const x = centerX + Math.cos(angle) * dataRadius;
                    const y = centerY + Math.sin(angle) * dataRadius;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = i % 3 === 0 ? this.primaryColor : this.secondaryColor;
                    ctx.globalAlpha = 0.8;
                    ctx.fill();
                }
                ctx.globalAlpha = 1.0;
            }

            renderDataVisualization(ctx, width, height) {
                // Visualización de datos en tiempo real con estilo táctico
                const time = Date.now() / 1000;
                const points = 50;
                
                // Onda de datos con glow cyan/magenta holográfico
                ctx.beginPath();
                ctx.strokeStyle = this.primaryColor;
                ctx.lineWidth = 3;
                ctx.shadowColor = this.primaryColor;
                ctx.shadowBlur = 15;
                
                for (let i = 0; i < points; i++) {
                    const x = (width / points) * i;
                    const amplitude = Math.sin(time + i * 0.1) * 80;
                    const frequency = Math.sin(time * 0.5 + i * 0.05) * 40;
                    const y = height / 2 + amplitude + frequency;
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                // Segunda onda con color secundario
                ctx.beginPath();
                ctx.strokeStyle = this.secondaryColor;
                ctx.lineWidth = 2;
                ctx.shadowColor = this.secondaryColor;
                ctx.shadowBlur = 10;
                
                for (let i = 0; i < points; i++) {
                    const x = (width / points) * i;
                    const amplitude = Math.cos(time + i * 0.08) * 60;
                    const frequency = Math.cos(time * 0.4 + i * 0.06) * 30;
                    const y = height / 2 + amplitude + frequency;
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                // Puntos de datos individuales holográficos
                for (let i = 0; i < points; i += 5) {
                    const x = (width / points) * i;
                    const amplitude = Math.sin(time + i * 0.1) * 80;
                    const frequency = Math.sin(time * 0.5 + i * 0.05) * 40;
                    const y = height / 2 + amplitude + frequency;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, 4, 0, Math.PI * 2);
                    ctx.fillStyle = this.primaryColor;
                    ctx.shadowColor = this.primaryColor;
                    ctx.shadowBlur = 12;
                    ctx.fill();
                }
                
                // Puntos secundarios
                for (let i = 2; i < points; i += 7) {
                    const x = (width / points) * i;
                    const amplitude = Math.cos(time + i * 0.08) * 60;
                    const frequency = Math.cos(time * 0.4 + i * 0.06) * 30;
                    const y = height / 2 + amplitude + frequency;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = this.secondaryColor;
                    ctx.shadowColor = this.secondaryColor;
                    ctx.shadowBlur = 8;
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }

            renderVFX() {
                const ctx = this.vfxCtx;
                const width = this.vfxCanvas.width;
                const height = this.vfxCanvas.height;
                
                // Limpiar canvas
                ctx.clearRect(0, 0, width, height);
                
                // Efectos de partículas
                if (this.isListening) {
                    this.renderAudioParticles(ctx, width, height);
                }
                
                // Holograma de datos
                this.renderHologram(ctx, width, height);
            }

            renderAudioParticles(ctx, width, height) {
                const time = Date.now() / 1000;
                const particleCount = 20;
                
                for (let i = 0; i < particleCount; i++) {
                    const x = width / 2 + Math.cos(time + i * 0.5) * 200;
                    const y = height / 2 + Math.sin(time + i * 0.5) * 200;
                    const size = Math.sin(time * 2 + i) * 3 + 5;
                    
                    ctx.beginPath();
                    ctx.arc(x, y, size, 0, Math.PI * 2);
                    ctx.fillStyle = this.primaryColor + '40';
                    ctx.fill();
                }
            }

            renderHologram(ctx, width, height) {
                const centerX = width / 2;
                const centerY = height / 2;
                const time = Date.now() / 1000;
                
                // Grid holográfico
                ctx.strokeStyle = this.primaryColor + '20';
                ctx.lineWidth = 1;
                
                const gridSize = 20;
                const gridCount = 10;
                
                for (let i = -gridCount; i <= gridCount; i++) {
                    // Líneas horizontales
                    ctx.beginPath();
                    ctx.moveTo(centerX - gridCount * gridSize, centerY + i * gridSize);
                    ctx.lineTo(centerX + gridCount * gridSize, centerY + i * gridSize);
                    ctx.stroke();
                    
                    // Líneas verticales
                    ctx.beginPath();
                    ctx.moveTo(centerX + i * gridSize, centerY - gridCount * gridSize);
                    ctx.lineTo(centerX + i * gridSize, centerY + gridCount * gridSize);
                    ctx.stroke();
                }
                
                // Datos flotantes
                const data = ['SYSTEM', 'ONLINE', 'GENIUS', 'ACTIVE'];
                data.forEach((text, i) => {
                    const x = centerX + Math.sin(time + i * 0.5) * 100;
                    const y = centerY - 100 + i * 30;
                    
                    ctx.fillStyle = this.primaryColor + '60';
                    ctx.font = '10px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(text, x, y);
                });
            }

            analyzeIntent(text) {
                // Análisis semántico avanzado
                const intents = {
                    greeting: ['hola', 'buenos días', 'saludos', 'hey', 'qué tal'],
                    question: ['qué', 'cómo', 'dónde', 'cuándo', 'por qué', 'cuál'],
                    command: ['haz', 'ejecuta', 'inicia', 'activa', 'abre', 'cierra'],
                    creation: ['crea', 'genera', 'diseña', 'construye', 'haz'],
                    analysis: ['analiza', 'examina', 'investiga', 'revisa', 'evalúa'],
                    location: ['mi casa', 'dirección', 'ubicación', 'lugar'],
                    hologram: ['holograma', '3d', 'proyección', 'visualización'],
                    conversation: ['hablemos', 'conversemos', 'charlemos', 'dialogar'],
                    system: ['sistema', 'estado', 'rendimiento', 'diagnóstico'],
                    security: ['seguridad', 'protección', 'vulnerabilidad', 'amenaza'],
                    data: ['datos', 'información', 'análisis', 'estadísticas'],
                    help: ['ayuda', 'asistencia', 'soporte', 'explica']
                };
                
                for (const [intent, keywords] of Object.entries(intents)) {
                    if (keywords.some(keyword => text.includes(keyword))) {
                        return intent;
                    }
                }
                
                return 'general';
            }

            extractEntities(text) {
                const entities = {};
                
                // Extraer ubicaciones
                if (text.includes('casa') || text.includes('hogar') || text.includes('dirección')) {

                // Extraer tipos de holograma
                if (text.includes('3d') || text.includes('tridimensional')) {

                // Extraer acciones
                if (text.includes('crea') || text.includes('genera')) {

                // Extraer objetos
                if (text.includes('casa') && text.includes('mi')) {
                    entities.object = 'user_home';
                }
                
                return entities;
